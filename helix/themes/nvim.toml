# Neovim default colorscheme for Helix
# Ported from Neovim 0.10+ built-in default (highlight_group.c)
# Dark background variant

# Comment scopes
"comment" = { fg = "light_grey4", modifiers = ["italic"] }
"comment.line" = "light_grey4"
"comment.block" = "light_grey4"
"comment.documentation" = "light_grey4"
"comment.unused" = "light_grey4"

# Constants (immutable values, booleans, numbers, chars)
"constant" = "light_grey2"
"constant.builtin" = "light_cyan"
"constant.builtin.boolean" = "light_grey2"
"constant.character" = "light_grey2"
"constant.character.escape" = "light_cyan"
"constant.numeric" = "light_grey2"
"constant.numeric.float" = "light_grey2"
"constant.numeric.integer" = "light_grey2"

# Strings (literals, regex, paths, URLs, symbols)
"string" = "light_green"
"string.regexp" = "light_cyan"
"string.special" = "light_cyan"
"string.special.path" = "light_cyan"
"string.special.symbol" = "light_cyan"
"string.special.url" = { fg = "light_blue", modifiers = ["underlined"] }

# Variables (identifiers, builtins, parameters, struct fields)
"variable" = "light_grey2"
"variable.builtin" = "light_cyan"
"variable.parameter" = "light_grey2"
"variable.other.member" = "light_blue"

# Labels (loop labels, etc.)
"label" = "light_grey2"

# Punctuation (delimiters, brackets, special symbols)
"punctuation" = "light_grey2"
"punctuation.delimiter" = "light_grey2"
"punctuation.bracket" = "light_grey2"
"punctuation.special" = "light_cyan"

# Keywords (control flow, imports, operators, directives)
"keyword" = "light_grey2"
"keyword.control" = "light_grey2"
"keyword.control.conditional" = "light_grey2"
"keyword.control.repeat" = "light_grey2"
"keyword.control.import" = "light_grey2"
"keyword.control.return" = "light_grey2"
"keyword.control.exception" = "light_grey2"
"keyword.operator" = "light_grey2"
"keyword.directive" = "light_grey2"
"keyword.function" = "light_grey2"
"keyword.storage" = "light_grey2"
"keyword.storage.type" = "light_grey2"
"keyword.storage.modifier" = "light_grey2"

# Operators (logical, mathematical)
"operator" = "light_grey2"

# Functions (calls, methods, macros, builtins)
"function" = "light_cyan"
"function.builtin" = "light_cyan"
"function.method" = "light_cyan"
"function.macro" = "light_grey2"
"function.special" = "light_grey2"

# Tags (HTML/XML elements)
"tag" = "light_cyan"
"tag.builtin" = "light_cyan"

# Types (classes, structs, enums, primitives)
"type" = "light_grey2"
"type.builtin" = "light_cyan"
"type.enum" = "light_grey2"
"type.variant" = "light_grey2"
"type.parameter" = "light_grey2"

# Namespaces / modules
"namespace" = "light_grey2"

# Attributes (class/struct fields, HTML tag attributes)
"attribute" = "light_grey2"

# Constructors
"constructor" = "light_cyan"

# Special symbols (e.g. `?` in Rust, `...` in Hare)
"special" = "light_cyan"

# Markup (Markdown, heading levels, bold, italic, links, lists, code blocks)
"markup.heading" = { fg = "light_grey2", modifiers = ["bold"] }
"markup.heading.1" = { fg = "light_grey2", modifiers = ["bold"] }
"markup.heading.2" = { fg = "light_grey2", modifiers = ["bold"] }
"markup.heading.3" = { fg = "light_grey2", modifiers = ["bold"] }
"markup.heading.4" = { fg = "light_grey2", modifiers = ["bold"] }
"markup.heading.5" = { fg = "light_grey2" }
"markup.heading.6" = { fg = "light_grey2" }
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.underline" = { modifiers = ["underlined"] }
"markup.link.url" = { modifiers = ["underlined"] }
"markup.link.text" = "light_blue"
"markup.raw" = "light_grey4"
"markup.raw.inline" = "light_grey4"
"markup.raw.block" = "light_grey4"
"markup.quote" = "light_grey4"
"markup.list" = "light_grey2"
"markup.list.unnumbered" = "light_grey2"
"markup.list.numbered" = "light_grey2"
"markup.list.checked" = "light_grey2"
"markup.list.unchecked" = "light_grey2"

# Diff (version control changes)
"diff.plus" = "light_green"
"diff.minus" = "light_red"
"diff.delta" = "light_cyan"

# Diagnostic gutter signs (LSP gutter indicators)
warning = "light_yellow"
error = "light_red"
info = "light_cyan"
hint = "light_blue"

# Diagnostic underlines (LSP inline diagnostics)
"diagnostic.warning" = { underline = { color = "light_yellow", style = "line" } }
"diagnostic.error" = { underline = { color = "light_red", style = "line" } }
"diagnostic.info" = { underline = { color = "light_cyan", style = "line" } }
"diagnostic.hint" = { underline = { color = "light_blue", style = "line" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# Tabstop (visible tab characters)
"tabstop" = { bg = "dark_grey4" }

# UI - Background and buffers
"ui.background" = { bg = "dark_grey2" }
"ui.bufferline" = { fg = "light_grey3", bg = "dark_grey3" }
"ui.bufferline.active" = { fg = "light_grey2", bg = "dark_grey3", modifiers = ["bold"] }
"ui.bufferline.background" = { bg = "dark_grey2" }

# UI - Cursors
"ui.cursor" = { modifiers = ["reversed"] }
"ui.cursor.normal" = { modifiers = ["reversed"] }
"ui.cursor.insert" = { fg = "dark_grey2", bg = "light_grey2" }
"ui.cursor.select" = { modifiers = ["reversed"] }
"ui.cursor.primary" = { modifiers = ["reversed"] }
"ui.cursor.primary.normal" = { modifiers = ["reversed"] }
"ui.cursor.primary.insert" = { fg = "dark_grey2", bg = "light_grey2" }
"ui.cursor.primary.select" = { modifiers = ["reversed"] }
"ui.cursor.match" = { bg = "dark_grey4", modifiers = ["bold"] }

# UI - Cursor lines and columns
"ui.cursorcolumn.primary" = { bg = "dark_grey3" }
"ui.cursorcolumn.secondary" = { bg = "dark_grey3" }
"ui.cursorline.primary" = { bg = "dark_grey3" }
"ui.cursorline.secondary" = { bg = "dark_grey3" }

# UI - Debug
"ui.debug.breakpoint" = { fg = "light_red" }
"ui.debug.active" = { fg = "light_red" }

# UI - Gutter (left margin for diagnostics and breakpoints)
"ui.gutter" = { fg = "dark_grey4" }
"ui.gutter.selected" = { fg = "dark_grey4" }

# UI - Help popup
"ui.help" = { bg = "dark_grey3", fg = "light_grey2" }

# UI - Highlight (buffer picker selection, symbol picker)
"ui.highlight" = { bg = "dark_grey3" }
"ui.highlight.frameline" = { bg = "dark_grey3" }

# UI - Line numbers
"ui.linenr" = { fg = "dark_grey4" }
"ui.linenr.selected" = { fg = "light_grey2", modifiers = ["bold"] }

# UI - Autocomplete menu
"ui.menu" = { fg = "light_grey2", bg = "dark_grey3" }
"ui.menu.selected" = { fg = "dark_grey3", bg = "light_grey2" }
"ui.menu.scroll" = { fg = "light_grey3", bg = "dark_grey4" }

# UI - Picker headers
"ui.picker.header" = { fg = "dark_grey1", bg = "light_cyan" }
"ui.picker.header.column" = { fg = "dark_grey1", bg = "light_cyan" }
"ui.picker.header.column.active" = { fg = "dark_grey1", bg = "light_cyan", modifiers = ["bold"] }

# UI - Popups (documentation and info boxes)
"ui.popup" = { bg = "dark_grey3" }
"ui.popup.info" = { fg = "light_grey2", bg = "dark_grey3" }

# UI - Selections
"ui.selection" = { bg = "dark_grey4" }
"ui.selection.primary" = { bg = "dark_grey4" }

# UI - Status line
"ui.statusline" = { fg = "dark_grey3", bg = "light_grey3" }
"ui.statusline.inactive" = { fg = "light_grey3", bg = "dark_grey3" }
"ui.statusline.normal" = { fg = "dark_grey2", bg = "light_grey3", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "dark_grey2", bg = "light_cyan", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "dark_grey2", bg = "light_yellow", modifiers = ["bold"] }
"ui.statusline.separator" = { fg = "light_grey3" }

# UI - Text (general editor text)
"ui.text" = { fg = "light_grey2" }
"ui.text.focus" = { fg = "light_grey1" }
"ui.text.inactive" = { fg = "light_grey4" }
"ui.text.info" = { fg = "light_grey2", bg = "dark_grey3" }
"ui.text.directory" = { fg = "light_cyan" }

# UI - Virtual text (rulers, whitespace, indent guides, inlay hints, wraps)
"ui.virtual.indent-guide" = { fg = "dark_grey4" }
"ui.virtual.inlay-hint" = { fg = "dark_grey4" }
"ui.virtual.jump-label" = { fg = "light_cyan", modifiers = ["bold"] }
"ui.virtual.ruler" = { fg = "dark_grey4" }
"ui.virtual.whitespace" = { fg = "dark_grey4" }
"ui.virtual.wrap" = { fg = "dark_grey4" }

# UI - Window split border
"ui.window" = { fg = "dark_grey4" }

[palette]
dark_grey1 = "#07080d"
dark_grey2 = "#14161b"
dark_grey3 = "#2c2e33"
dark_grey4 = "#4f5258"
light_grey1 = "#eef1f8"
light_grey2 = "#e0e2ea"
light_grey3 = "#c4c6cd"
light_grey4 = "#9b9ea4"
light_cyan = "#8cf8f7"
light_blue = "#a6dbff"
light_green = "#b4f6c0"
light_red = "#ffc0b9"
light_yellow = "#fce094"
