# Neovim default colorscheme for Helix
# Ported from Neovim 0.10+ built-in default (highlight_group.c)
# Dark background variant

# Comment scopes
"comment" = { fg = "NvimLightGrey4", modifiers = ["italic"] }
"comment.line" = "NvimLightGrey4"
"comment.block" = "NvimLightGrey4"
"comment.documentation" = "NvimLightGrey4"
"comment.unused" = "NvimLightGrey4"

# Constants (immutable values, booleans, numbers, chars)
"constant" = "NvimLightGrey2"
"constant.builtin" = "NvimLightCyan"
"constant.builtin.boolean" = "NvimLightGrey2"
"constant.character" = "NvimLightGrey2"
"constant.character.escape" = "NvimLightCyan"
"constant.numeric" = "NvimLightGrey2"
"constant.numeric.float" = "NvimLightGrey2"
"constant.numeric.integer" = "NvimLightGrey2"

# Strings (literals, regex, paths, URLs, symbols)
"string" = "NvimLightGreen"
"string.regexp" = "NvimLightCyan"
"string.special" = "NvimLightCyan"
"string.special.path" = "NvimLightCyan"
"string.special.symbol" = "NvimLightCyan"
"string.special.url" = { fg = "NvimLightBlue", modifiers = ["underlined"] }

# Variables (identifiers, builtins, parameters, struct fields)
"variable" = "NvimLightGrey2"
"variable.builtin" = "NvimLightCyan"
"variable.parameter" = "NvimLightGrey2"
"variable.other.member" = "NvimLightBlue"

# Labels (loop labels, etc.)
"label" = "NvimLightGrey2"

# Punctuation (delimiters, brackets, special symbols)
"punctuation" = "NvimLightGrey2"
"punctuation.delimiter" = "NvimLightGrey2"
"punctuation.bracket" = "NvimLightGrey2"
"punctuation.special" = "NvimLightCyan"

# Keywords (control flow, imports, operators, directives)
"keyword" = "NvimLightGrey2"
"keyword.control" = "NvimLightGrey2"
"keyword.control.conditional" = "NvimLightGrey2"
"keyword.control.repeat" = "NvimLightGrey2"
"keyword.control.import" = "NvimLightGrey2"
"keyword.control.return" = "NvimLightGrey2"
"keyword.control.exception" = "NvimLightGrey2"
"keyword.operator" = "NvimLightGrey2"
"keyword.directive" = "NvimLightGrey2"
"keyword.function" = "NvimLightGrey2"
"keyword.storage" = "NvimLightGrey2"
"keyword.storage.type" = "NvimLightGrey2"
"keyword.storage.modifier" = "NvimLightGrey2"

# Operators (logical, mathematical)
"operator" = "NvimLightGrey2"

# Functions (calls, methods, macros, builtins)
"function" = "NvimLightCyan"
"function.builtin" = "NvimLightCyan"
"function.method" = "NvimLightCyan"
"function.macro" = "NvimLightGrey2"
"function.special" = "NvimLightGrey2"

# Tags (HTML/XML elements)
"tag" = "NvimLightCyan"
"tag.builtin" = "NvimLightCyan"

# Types (classes, structs, enums, primitives)
"type" = "NvimLightGrey2"
"type.builtin" = "NvimLightCyan"
"type.enum" = "NvimLightGrey2"
"type.variant" = "NvimLightGrey2"
"type.parameter" = "NvimLightGrey2"

# Namespaces / modules
"namespace" = "NvimLightGrey2"

# Attributes (class/struct fields, HTML tag attributes)
"attribute" = "NvimLightGrey2"

# Constructors
"constructor" = "NvimLightCyan"

# Special symbols (e.g. `?` in Rust, `...` in Hare)
"special" = "NvimLightCyan"

# Markup (Markdown, heading levels, bold, italic, links, lists, code blocks)
"markup.heading" = { fg = "NvimLightGrey2", modifiers = ["bold"] }
"markup.heading.1" = { fg = "NvimLightGrey2", modifiers = ["bold"] }
"markup.heading.2" = { fg = "NvimLightGrey2", modifiers = ["bold"] }
"markup.heading.3" = { fg = "NvimLightGrey2", modifiers = ["bold"] }
"markup.heading.4" = { fg = "NvimLightGrey2", modifiers = ["bold"] }
"markup.heading.5" = { fg = "NvimLightGrey2" }
"markup.heading.6" = { fg = "NvimLightGrey2" }
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.underline" = { modifiers = ["underlined"] }
"markup.link.url" = { modifiers = ["underlined"] }
"markup.link.text" = "NvimLightBlue"
"markup.raw" = "NvimLightGrey4"
"markup.raw.inline" = "NvimLightGrey4"
"markup.raw.block" = "NvimLightGrey4"
"markup.quote" = "NvimLightGrey4"
"markup.list" = "NvimLightGrey2"
"markup.list.unnumbered" = "NvimLightGrey2"
"markup.list.numbered" = "NvimLightGrey2"
"markup.list.checked" = "NvimLightGrey2"
"markup.list.unchecked" = "NvimLightGrey2"

# Diff (version control changes)
"diff.plus" = "NvimLightGreen"
"diff.minus" = "NvimLightRed"
"diff.delta" = "NvimLightCyan"

# Diagnostic gutter signs (LSP gutter indicators)
warning = "NvimLightYellow"
error = "NvimLightRed"
info = "NvimLightCyan"
hint = "NvimLightBlue"

# Diagnostic underlines (LSP inline diagnostics)
"diagnostic.warning" = { underline = { color = "NvimLightYellow", style = "line" } }
"diagnostic.error" = { underline = { color = "NvimLightRed", style = "line" } }
"diagnostic.info" = { underline = { color = "NvimLightCyan", style = "line" } }
"diagnostic.hint" = { underline = { color = "NvimLightBlue", style = "line" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# Tabstop (visible tab characters)
"tabstop" = { bg = "NvimDarkGrey4" }

# UI - Background and buffers
"ui.background" = { bg = "NvimDarkGrey2" }
"ui.bufferline" = { fg = "NvimLightGrey3", bg = "NvimDarkGrey3" }
"ui.bufferline.active" = { fg = "NvimLightGrey2", bg = "NvimDarkGrey3", modifiers = ["bold"] }
"ui.bufferline.background" = { bg = "NvimDarkGrey2" }

# UI - Cursors
"ui.cursor" = { modifiers = ["reversed"] }
"ui.cursor.normal" = { modifiers = ["reversed"] }
"ui.cursor.insert" = { fg = "NvimDarkGrey2", bg = "NvimLightGrey2" }
"ui.cursor.select" = { modifiers = ["reversed"] }
"ui.cursor.primary" = { modifiers = ["reversed"] }
"ui.cursor.primary.normal" = { modifiers = ["reversed"] }
"ui.cursor.primary.insert" = { fg = "NvimDarkGrey2", bg = "NvimLightGrey2" }
"ui.cursor.primary.select" = { modifiers = ["reversed"] }
"ui.cursor.match" = { bg = "NvimDarkGrey4", modifiers = ["bold"] }

# UI - Cursor lines and columns
"ui.cursorcolumn.primary" = { bg = "NvimDarkGrey3" }
"ui.cursorcolumn.secondary" = { bg = "NvimDarkGrey3" }
"ui.cursorline.primary" = { bg = "NvimDarkGrey3" }
"ui.cursorline.secondary" = { bg = "NvimDarkGrey3" }

# UI - Debug
"ui.debug.breakpoint" = { fg = "NvimLightRed" }
"ui.debug.active" = { fg = "NvimLightRed" }

# UI - Gutter (left margin for diagnostics and breakpoints)
"ui.gutter" = { fg = "NvimDarkGrey4" }
"ui.gutter.selected" = { fg = "NvimDarkGrey4" }

# UI - Help popup
"ui.help" = { bg = "NvimDarkGrey3", fg = "NvimLightGrey2" }

# UI - Highlight (buffer picker selection, symbol picker)
"ui.highlight" = { bg = "NvimDarkGrey3" }
"ui.highlight.frameline" = { bg = "NvimDarkGrey3" }

# UI - Line numbers
"ui.linenr" = { fg = "NvimDarkGrey4" }
"ui.linenr.selected" = { fg = "NvimLightYellow", modifiers = ["bold"] }

# UI - Autocomplete menu
"ui.menu" = { fg = "NvimLightGrey2", bg = "NvimDarkGrey3" }
"ui.menu.selected" = { fg = "NvimDarkGrey3", bg = "NvimLightGrey2" }
"ui.menu.scroll" = { fg = "NvimLightGrey3", bg = "NvimDarkGrey4" }

# UI - Picker headers
"ui.picker.header" = { fg = "NvimDarkGrey1", bg = "NvimLightCyan" }
"ui.picker.header.column" = { fg = "NvimDarkGrey1", bg = "NvimLightCyan" }
"ui.picker.header.column.active" = { fg = "NvimDarkGrey1", bg = "NvimLightCyan", modifiers = ["bold"] }

# UI - Popups (documentation and info boxes)
"ui.popup" = { bg = "NvimDarkGrey3" }
"ui.popup.info" = { fg = "NvimLightGrey2", bg = "NvimDarkGrey3" }

# UI - Selections
"ui.selection" = { bg = "NvimDarkGrey4" }
"ui.selection.primary" = { bg = "NvimDarkGrey4" }

# UI - Status line
"ui.statusline" = { fg = "NvimDarkGrey3", bg = "NvimLightGrey3" }
"ui.statusline.inactive" = { fg = "NvimLightGrey3", bg = "NvimDarkGrey3" }
"ui.statusline.normal" = { fg = "NvimDarkGrey2", bg = "NvimLightGrey3", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "NvimDarkGrey2", bg = "NvimLightCyan", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "NvimDarkGrey2", bg = "NvimLightYellow", modifiers = ["bold"] }
"ui.statusline.separator" = { fg = "NvimLightGrey3" }

# UI - Text (general editor text)
"ui.text" = { fg = "NvimLightGrey2" }
"ui.text.focus" = { fg = "NvimLightGrey1" }
"ui.text.inactive" = { fg = "NvimLightGrey4" }
"ui.text.info" = { fg = "NvimLightGrey2", bg = "NvimDarkGrey3" }
"ui.text.directory" = { fg = "NvimLightCyan" }

# UI - Virtual text (rulers, whitespace, indent guides, inlay hints, wraps)
"ui.virtual.indent-guide" = { fg = "NvimDarkGrey4" }
"ui.virtual.inlay-hint" = { fg = "NvimDarkGrey4" }
"ui.virtual.jump-label" = { fg = "NvimLightCyan", modifiers = ["bold"] }
"ui.virtual.ruler" = { fg = "NvimDarkGrey4" }
"ui.virtual.whitespace" = { fg = "NvimDarkGrey4" }
"ui.virtual.wrap" = { fg = "NvimDarkGrey4" }

# UI - Window split border
"ui.window" = { fg = "NvimDarkGrey4" }

